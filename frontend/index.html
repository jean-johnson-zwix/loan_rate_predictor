<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Rate Estimator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,wght@0,300;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e0e;
      color: #f0ead6;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.25rem 5rem;
    }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0.022;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    }

    .wrapper { width: 100%; max-width: 600px; }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #f5e642;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.1rem;
    }
    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 1px;
      background: #f5e642;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: #f0ead6;
      margin: 0 0 0.6rem;
    }
    h1 em { font-style: italic; color: #f5e642; font-weight: 600; }

    .subtitle {
      font-size: 0.92rem;
      color: #c8bfa8;
      line-height: 1.8;
      max-width: 460px;
      margin: 0 0 2.5rem;
    }

    .card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 2rem;
    }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem 1rem; }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #807870;
      margin-bottom: 0.45rem;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      background: #181818;
      color: #f0ead6;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { outline: none; border-color: #f5e642; }

    details { margin-top: 1.4rem; }
    summary {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #a899e6;
      cursor: pointer;
      user-select: none;
      margin-bottom: 1rem;
    }

    button {
      width: 100%;
      margin-top: 1.6rem;
      padding: 0.8rem;
      background: #f5e642;
      color: #0e0e0e;
      border: none;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { opacity: 0.85; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,230,66,0.2); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    #result {
      margin-top: 1.5rem;
      padding: 1.3rem 1.4rem;
      border-radius: 8px;
      background: rgba(245,230,66,0.05);
      border: 1px solid rgba(245,230,66,0.2);
      display: none;
    }
    #result.error {
      background: rgba(240,111,170,0.06);
      border-color: rgba(240,111,170,0.25);
    }

    .result-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.85rem; }
    .result-row:last-of-type { margin-bottom: 0; }
    .result-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #807870;
    }
    .result-value {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.7rem;
      font-weight: 600;
      color: #f0ead6;
    }
    .result-value.spread { color: #f5e642; }
    .result-note {
      font-size: 0.72rem;
      color: #66665e;
      line-height: 1.7;
      margin: 1rem 0 0;
      font-family: 'DM Mono', monospace;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #0e0e0e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: #66665e;
      letter-spacing: 0.06em;
      margin: 1.75rem 0 0;
      text-align: center;
    }
    .footer .dot { color: #f5e642; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="eyebrow">Arizona HMDA · Rate Model</div>

  <h1>Loan Rate <em>Estimator</em></h1>
  <p class="subtitle">Estimated rate spread (APR − APOR) for Arizona residential mortgages, from a model trained on public HMDA data.</p>

  <div class="card">
    <form id="form">
      <div class="grid">
        <div>
          <label for="loan_amount">Loan Amount ($)</label>
          <input type="number" id="loan_amount" name="loan_amount" value="350000" min="1" required>
        </div>
        <div>
          <label for="property_value">Property Value ($)</label>
          <input type="number" id="property_value" name="property_value" value="440000" min="1" required>
        </div>
        <div>
          <label for="income">Annual Income ($K)</label>
          <input type="number" id="income" name="income" value="120" min="1" required>
        </div>
        <div>
          <label for="loan_to_value_ratio">LTV (%)</label>
          <input type="number" id="loan_to_value_ratio" name="loan_to_value_ratio" value="79.5" step="0.01" min="0" max="200">
        </div>
        <div>
          <label for="loan_term">Loan Term</label>
          <select id="loan_term" name="loan_term">
            <option value="360" selected>30-year fixed</option>
            <option value="180">15-year fixed</option>
            <option value="300">25-year</option>
            <option value="240">20-year</option>
          </select>
        </div>
        <div>
          <label for="loan_type">Loan Type</label>
          <select id="loan_type" name="loan_type">
            <option value="1" selected>Conventional</option>
            <option value="2">FHA</option>
            <option value="3">VA</option>
            <option value="4">RHS/FSA</option>
          </select>
        </div>
        <div>
          <label for="loan_purpose">Loan Purpose</label>
          <select id="loan_purpose" name="loan_purpose">
            <option value="1" selected>Home purchase</option>
            <option value="31">Refinance — cash-out</option>
            <option value="32">Refinance — rate/term</option>
            <option value="2">Home improvement</option>
            <option value="4">Other purpose</option>
            <option value="5">N/A</option>
          </select>
        </div>
        <div>
          <label for="occupancy_type">Occupancy</label>
          <select id="occupancy_type" name="occupancy_type">
            <option value="1" selected>Principal residence</option>
            <option value="2">Second residence</option>
            <option value="3">Investment property</option>
          </select>
        </div>
        <div>
          <label for="debt_to_income_ratio">Debt-to-Income</label>
          <select id="debt_to_income_ratio" name="debt_to_income_ratio">
            <option value="&lt;20%">&lt;20%</option>
            <option value="20%-&lt;30%">20%–30%</option>
            <option value="30%-&lt;36%" selected>30%–36%</option>
            <option value="36">36%</option>
            <option value="37">37%</option>
            <option value="38">38%</option>
            <option value="39">39%</option>
            <option value="40">40%</option>
            <option value="41">41%</option>
            <option value="42">42%</option>
            <option value="43">43%</option>
            <option value="44">44%</option>
            <option value="45">45%</option>
            <option value="46">46%</option>
            <option value="47">47%</option>
            <option value="48">48%</option>
            <option value="49">49%</option>
            <option value="50%-60%">50%–60%</option>
            <option value="&gt;60%">&gt;60%</option>
          </select>
        </div>
        <div>
          <label for="conforming_loan_limit">Conforming?</label>
          <select id="conforming_loan_limit" name="conforming_loan_limit">
            <option value="C" selected>Conforming</option>
            <option value="NC">Non-conforming</option>
          </select>
        </div>
      </div>

      <details>
        <summary>Advanced / property details</summary>
        <div class="grid" style="margin-top:0.5rem">
          <div>
            <label for="construction_method">Construction</label>
            <select id="construction_method" name="construction_method">
              <option value="1" selected>Site-built</option>
              <option value="2">Manufactured</option>
            </select>
          </div>
          <div>
            <label for="lien_status">Lien Status</label>
            <select id="lien_status" name="lien_status">
              <option value="1" selected>First lien</option>
            </select>
          </div>
          <div>
            <label for="derived_loan_product_type">Product Type</label>
            <select id="derived_loan_product_type" name="derived_loan_product_type">
              <option value="Conventional:First Lien" selected>Conventional: First Lien</option>
              <option value="FHA:First Lien">FHA: First Lien</option>
              <option value="VA:First Lien">VA: First Lien</option>
              <option value="FSA/RHS:First Lien">FSA/RHS: First Lien</option>
            </select>
          </div>
          <div>
            <label for="derived_dwelling_category">Dwelling</label>
            <select id="derived_dwelling_category" name="derived_dwelling_category">
              <option value="Single Family (1-4 Units):Site-Built" selected>Single family, site-built</option>
              <option value="Single Family (1-4 Units):Manufactured">Single family, manufactured</option>
              <option value="Multifamily:Site-Built">Multifamily</option>
            </select>
          </div>
          <div>
            <label for="total_units">Total Units</label>
            <input type="number" id="total_units" name="total_units" value="1" min="1">
          </div>
          <div>
            <label for="tract_population">Tract Population</label>
            <input type="number" id="tract_population" name="tract_population" value="4000">
          </div>
          <div>
            <label for="ffiec_msa_md_median_family_income">Area Median Income ($)</label>
            <input type="number" id="ffiec_msa_md_median_family_income" name="ffiec_msa_md_median_family_income" value="79000">
          </div>
          <div>
            <label for="tract_to_msa_income_percentage">Tract/MSA Income (%)</label>
            <input type="number" id="tract_to_msa_income_percentage" name="tract_to_msa_income_percentage" value="85" step="0.01">
          </div>
          <div>
            <label for="tract_owner_occupied_units">Owner-Occ. Units</label>
            <input type="number" id="tract_owner_occupied_units" name="tract_owner_occupied_units" value="900">
          </div>
          <div>
            <label for="tract_one_to_four_family_homes">1–4 Family Homes</label>
            <input type="number" id="tract_one_to_four_family_homes" name="tract_one_to_four_family_homes" value="1200">
          </div>
          <div>
            <label for="tract_median_age_of_housing_units">Median Housing Age (yr)</label>
            <input type="number" id="tract_median_age_of_housing_units" name="tract_median_age_of_housing_units" value="25">
          </div>
          <div>
            <label for="negative_amortization">Neg. Amortization</label>
            <select id="negative_amortization" name="negative_amortization">
              <option value="2" selected>No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div>
            <label for="interest_only_payment">Interest Only</label>
            <select id="interest_only_payment" name="interest_only_payment">
              <option value="2" selected>No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div>
            <label for="balloon_payment">Balloon Payment</label>
            <select id="balloon_payment" name="balloon_payment">
              <option value="2" selected>No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div>
            <label for="other_nonamortizing_features">Other Non-Amortizing</label>
            <select id="other_nonamortizing_features" name="other_nonamortizing_features">
              <option value="2" selected>No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div>
            <label for="manufactured_home_secured_property_type">MH Property Type</label>
            <select id="manufactured_home_secured_property_type" name="manufactured_home_secured_property_type">
              <option value="3" selected>N/A</option>
              <option value="1">Manufactured home</option>
              <option value="2">Manufactured home + land</option>
            </select>
          </div>
          <div>
            <label for="manufactured_home_land_property_interest">MH Land Interest</label>
            <select id="manufactured_home_land_property_interest" name="manufactured_home_land_property_interest">
              <option value="5" selected>N/A</option>
              <option value="1">Direct ownership</option>
              <option value="2">Indirect ownership</option>
              <option value="3">Paid leasehold</option>
              <option value="4">Unpaid leasehold</option>
            </select>
          </div>
          <div>
            <label for="prepayment_penalty_term">Prepayment Penalty (mo)</label>
            <select id="prepayment_penalty_term" name="prepayment_penalty_term">
              <option value="0" selected>None</option>
              <option value="12">12</option>
              <option value="24">24</option>
              <option value="36">36</option>
              <option value="48">48</option>
              <option value="60">60</option>
            </select>
          </div>
        </div>
      </details>

      <button type="submit" id="btn">Get Rate Estimate</button>
    </form>

    <div id="result">
      <div id="result-content"></div>
    </div>
  </div>

  <p class="footer">Jean<span class="dot">.</span> · Arizona HMDA Rate Model</p>
</div>

<script>
  const API_URL = "https://jhl3rolno5.execute-api.us-east-1.amazonaws.com/price";

  const form = document.getElementById("form");
  const btn = document.getElementById("btn");
  const resultEl = document.getElementById("result");
  const resultContent = document.getElementById("result-content");

  const STRING_FIELDS = ["loan_type","loan_purpose","lien_status","occupancy_type",
    "construction_method","conforming_loan_limit","debt_to_income_ratio",
    "manufactured_home_secured_property_type","manufactured_home_land_property_interest",
    "derived_loan_product_type","derived_dwelling_category","negative_amortization",
    "interest_only_payment","balloon_payment","other_nonamortizing_features",
    "prepayment_penalty_term"];

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Estimating\u2026';
    resultEl.style.display = "none";
    resultEl.classList.remove("error");

    const data = {};
    new FormData(form).forEach((v, k) => {
      const n = parseFloat(v);
      data[k] = (isNaN(n) || STRING_FIELDS.includes(k)) ? v : n;
    });

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);

      resultContent.innerHTML = `
        <div class="result-row">
          <span class="result-label">Estimated Rate Spread</span>
          <span class="result-value spread">+${json.rate_spread.toFixed(3)}%</span>
        </div>
        <div class="result-row">
          <span class="result-label">Indicative APR</span>
          <span class="result-value">${json.indicative_apr.toFixed(3)}%</span>
        </div>
        <p class="result-note">Estimate from model trained on ${json.trained_on} Arizona HMDA data. APOR benchmark from FFIEC rate table; actual APR varies by lender.</p>
      `;
      resultEl.style.display = "block";
    } catch (err) {
      resultContent.innerHTML = `<p style="color:#f06faa;font-size:0.9rem;font-family:'DM Mono',monospace;line-height:1.6;margin:0">${err.message}</p>`;
      resultEl.classList.add("error");
      resultEl.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "Get Rate Estimate";
    }
  });
</script>
</body>
</html>
